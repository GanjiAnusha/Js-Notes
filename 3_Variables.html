<!-- This code will run and show a button click me if we click js dyanmically increases the count -->

<!DOCTYPE html>
<html>
<head>
    <title>Click Counter</title>
</head>
<body>

<button id="btn-a">Click me</button>
<h3 id="heading-a">0 clicks so far</h3>

<script>
    const btnA = document.querySelector('#btn-a');
    const headingA = document.querySelector('#heading-a');

    let count = 0;

    btnA.onclick = () => {
        count++;
        headingA.textContent = `${count} clicks so far`;
    };
</script>

</body>
</html>
