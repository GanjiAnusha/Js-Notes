⭐Variable Rules-
    🎯A-Z,a-z,0-9,_ (underscore),$ are only allowed to create variables
    
    🎯Reserved names like let,const,function,class,if,... can't be used as variables.Be descriptive names but don't overlay words

    🎯Vague variables are avoided like 
        -Single letter names
        -generic terms
        -excessive abbrrevations 
        -misleading clues
        -ambigious names

    🎯Camel case(suggested).can't start with digit,non-latin letters allowed,but not recommend.Be stick on to casing whatever you choose to recommended naming

    🎯Variables in Js are case senstive (e.g., myVariable and MyVariable are different)

    🎯casing convention to break words-
        🏹Camel case (e.g., querySelectorAll,indexOf.getElementId,...) function names can be in camel case.
        🏹Pascal case(e.g., WhiteLine,ReadLine,GetType,....) class names be descriptive and suggested to use it.It allows HTML form react
        🏹Snake case (e.g., query_selector_all, index_of, get_element_id,array_push,Mysqli_connect,str_split ...)
        🏹Screaming snake (e.g., MAX_SIZE, TOTAL_COUNT,MAX_SAFE_INTEGER ...) like constants
        🏹Kebab case (e.g., query-selector-all, index-of, get-element-id) used for variables or functions,cutomizable,....
        🏹Private variables like _Privatevar to identify and modern js supports using #prefix access only within class from ES20+ e.g., below

<!-- This code will run and show a button click me if we click js dyanmically increases the count -->

<!DOCTYPE html>
<html>
<head>
    <title>Click Counter</title>
</head>
<body>

<button id="btn-a">Click me</button>
<h3 id="heading-a">0 clicks so far</h3>

<script>
    const btnA = document.querySelector('#btn-a');
    const headingA = document.querySelector('#heading-a');

    let count = 0;

    btnA.onclick = () => {
        count++;
        headingA.textContent = `${count} clicks so far`;
    };
</script>

</body>
</html>
